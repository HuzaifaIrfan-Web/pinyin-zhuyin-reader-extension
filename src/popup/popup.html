<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./popup.css">
  <title>Pinyin Zhuyin Reader</title>
</head>

<body>

  <div class="wrapper">
    <!-- Your main popup content goes here -->
    <main class="content">

      <h2>Pinyin Zhuyin Reader</h2>

      Reader Type:
      <div class="audio-type-options">
        <label>
          <input type="radio" name="audioType" value="off" checked>
          Off
        </label>

        <label>
          <input type="radio" name="audioType" value="tts">
          TTS
        </label>

        <br>


        <label>
          <input type="radio" name="audioType" value="yoyo">
          Yoyo
        </label>

        <label>
          <input type="radio" name="audioType" value="dong">
          Dong
        </label>

        <label>
          <input type="radio" name="audioType" value="arch">
          Arch
        </label>

        <br>
        <label>
          <input type="radio" name="audioType" value="altyoyodong">
          Alt Yoyo Dong
        </label>

        <label>
          <input type="radio" name="audioType" value="altyoyoarch">
          Alt Yoyo Arch
        </label>



        <br>

        <label>
          <input type="radio" name="audioType" value="altdongyoyo">
          Alt Dong Yoyo
        </label>

        <label>
          <input type="radio" name="audioType" value="altdongarch">
          Alt Dong Arch
        </label>



        <br>

        <label>
          <input type="radio" name="audioType" value="altarchyoyo">
          Alt Arch Yoyo
        </label>

        <label>
          <input type="radio" name="audioType" value="altarchdong">
          Alt Arch Dong
        </label>


        <br>

        <label>
          <input type="radio" name="audioType" value="altyoyodongarch">
          Alt Yoyo Dong Arch
        </label>

        <label>
          <input type="radio" name="audioType" value="altyoyoarchdong">
          Alt Yoyo Arch Dong
        </label>


        <br>

        <label>
          <input type="radio" name="audioType" value="altdongyoyoarch">
          Alt Dong Yoyo Arch
        </label>

        <label>
          <input type="radio" name="audioType" value="altdongarchyoyo">
          Alt Dong Arch Yoyo
        </label>

        <br>

        <label>
          <input type="radio" name="audioType" value="altarchyoyodong">
          Alt Arch Yoyo Dong
        </label>

        <label>
          <input type="radio" name="audioType" value="altarchdongyoyo">
          Alt Arch Dong Yoyo
        </label>
      </div>



    </main>

    <!-- Sticky Footer -->
    <footer class="popup-footer">
      <a href="https://huzaifairfan.com/" target="_blank">Developed by Huzaifa Irfan</a>
      <a href="https://github.com/HuzaifaIrfan-Web/pinyin-zhuyin-reader-extension" target="_blank">Github</a>
      <span>v1.0.1</span>
    </footer>
  </div>

  <script type="module" src="./popup.js"></script>
</body>

</html>
